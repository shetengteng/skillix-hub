<div class="node $node_classes" data-status="$status">
  <span class="dot $status" aria-hidden="true"></span>
  <div class="node-main">
    <div class="node-title-row">
      <span class="node-alias">$alias</span>
      <span class="node-type">$ntype</span>
      $cursor_tag
    </div>
    <div class="node-meta">$meta</div>
  </div>
  <div class="node-duration">$duration</div>
</div>
