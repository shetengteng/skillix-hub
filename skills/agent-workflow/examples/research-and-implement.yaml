name: research-and-implement
version: "1.0"
description: |
  调研一个主题 → 用户确认大纲 → 由当前 IDE agent 落地实现。
  全部走 caller，适合在单 IDE 内完成。

vars:
  topic: ""

nodes:
  - alias: research
    type: agent_call
    description: 调研主题，给出 3-5 个核心要点
    executor: caller
    prompt: |
      请就主题"{{topic}}"做调研，输出 3-5 个核心要点，每点附 1 行说明。
    output: research_notes

  - alias: confirm_scope
    type: wait_user
    description: 让用户确认调研结果是否可作为后续实现的依据
    message: |
      调研结果如下，是否接受作为实现依据？

      {{research_notes}}
    schema:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        feedback:
          type: string
          default: ""

  - alias: implement
    type: agent_call
    description: 在当前 IDE agent 中落地实现
    executor: caller
    prompt: |
      调研要点：
      {{research_notes}}

      用户反馈（若有）：{{confirm_scope.feedback}}

      请在仓库内完成实现，列出修改的文件清单和关键代码片段。
    output: implementation_summary
