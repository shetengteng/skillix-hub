<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Automation Builder - 录制中</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
    color: #e2e8f0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .container {
    text-align: center;
    max-width: 600px;
    padding: 48px;
  }
  .pulse-dot {
    width: 16px; height: 16px;
    background: #ef4444;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    animation: pulse 1.5s ease-in-out infinite;
    vertical-align: middle;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(1.3); }
  }
  h1 {
    font-size: 28px;
    font-weight: 600;
    margin-bottom: 16px;
    color: #f1f5f9;
  }
  .status {
    font-size: 18px;
    color: #94a3b8;
    margin-bottom: 32px;
    line-height: 1.6;
  }
  .instructions {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 12px;
    padding: 24px;
    text-align: left;
    margin-bottom: 24px;
  }
  .instructions h2 {
    font-size: 16px;
    color: #cbd5e1;
    margin-bottom: 12px;
  }
  .instructions li {
    font-size: 14px;
    color: #94a3b8;
    margin-bottom: 8px;
    padding-left: 4px;
  }
  .footer {
    font-size: 12px;
    color: #475569;
    margin-top: 24px;
  }
</style>
</head>
<body>
<div class="container">
  <h1><span class="pulse-dot"></span>录制已开始</h1>
  <p class="status">
    系统正在记录您的浏览器操作<br>
    请在此浏览器中自由操作
  </p>
  <div class="instructions">
    <h2>操作指引</h2>
    <ol>
      <li>在地址栏输入目标网址，开始您的操作</li>
      <li>所有点击、输入、导航和 API 请求都会被自动记录</li>
      <li>操作完成后，回到 Cursor 点击对话框中的"停止录制"按钮</li>
    </ol>
  </div>
  <p class="footer">Web Automation Builder v2.0 · Passive Recording Mode</p>
</div>
</body>
</html>
